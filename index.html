<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - اختبار الذكاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <span class="brain-icon">🧠</span>
            <h1>اختبار الذكاء</h1>
            <p>سجل دخولك لبدء الاختبار</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <!-- تم تعديل action للانتقال إلى content.html -->
        <form action="content.html" method="GET">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>
                <div id="usernameError" class="error-message">يرجى إدخال اسم المستخدم</div>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                <div id="passwordError" class="error-message">يرجى إدخال كلمة المرور</div>
            </div>

            <button type="submit" class="btn-primary">تسجيل الدخول</button>
        </form>

        <div class="auth-link">
            ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <script>
        // ============================================
        // التحقق من صحة البيانات قبل الانتقال
        // ============================================

        document.querySelector('form').addEventListener('submit', function(e) {
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');
            let isValid = true;

            // إخفاء الأخطاء السابقة
            username.classList.remove('error');
            password.classList.remove('error');
            usernameError.style.display = 'none';
            passwordError.style.display = 'none';

            // التحقق من اسم المستخدم
            if (username.value.trim() === '') {
                username.classList.add('error');
                usernameError.style.display = 'block';
                isValid = false;
            }

            // التحقق من كلمة المرور
            if (password.value.trim() === '') {
                password.classList.add('error');
                passwordError.style.display = 'block';
                isValid = false;
            }

            // إذا كان هناك خطأ، نمنع الانتقال
            if (!isValid) {
                e.preventDefault();
            } else {
                // إذا كان كل شيء صحيحاً، ننتقل إلى content.html
                // مع تمرير اسم المستخدم في الرابط (اختياري)
                const usernameValue = username.value.trim();
                window.location.href = `content.html?username=${encodeURIComponent(usernameValue)}`;
                e.preventDefault(); // نمنع الإرسال العادي
            }
        });

        // ============================================
        // عرض رسائل من URL (اختياري)
        // ============================================

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const success = urlParams.get('success');
            const alertDiv = document.getElementById('alertMessage');

            if (alertDiv) {
                if (error) {
                    alertDiv.className = 'alert alert-danger';
                    alertDiv.style.display = 'block';
                    const messages = {
                        'invalid': '❌ اسم المستخدم أو كلمة المرور غير صحيحة',
                        'empty': '❌ يرجى ملء جميع الحقول',
                        'not_found': '❌ المستخدم غير موجود'
                    };
                    alertDiv.textContent = messages[error] || '❌ حدث خطأ، يرجى المحاولة مرة أخرى';
                }

                if (success === 'registered') {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.style.display = 'block';
                    alertDiv.textContent = '✅ تم التسجيل بنجاح! يرجى تسجيل الدخول';
                }
            }
        })();
    </script>
</body>
</html>
