<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - اختبار الذكاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <span class="brain-icon">🧠</span>
            <h1>اختبار الذكاء</h1>
            <p>سجل دخولك لبدء الاختبار</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <form id="loginForm" action="login.php" method="POST">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>
                <div id="usernameError" class="error-message">يرجى إدخال اسم المستخدم</div>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                <div id="passwordError" class="error-message">يرجى إدخال كلمة المرور</div>
            </div>

            <button type="submit" class="btn-primary">تسجيل الدخول</button>
        </form>

        <div class="auth-link">
            ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // عرض رسائل من URL
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const success = urlParams.get('success');
            const alertDiv = document.getElementById('alertMessage');

            if (error) {
                alertDiv.className = 'alert alert-danger';
                alertDiv.style.display = 'block';
                const messages = {
                    'invalid': 'اسم المستخدم أو كلمة المرور غير صحيحة',
                    'empty': 'يرجى ملء جميع الحقول',
                    'not_found': 'المستخدم غير موجود',
                    'db_error': 'حدث خطأ في قاعدة البيانات'
                };
                alertDiv.textContent = messages[error] || 'حدث خطأ، يرجى المحاولة مرة أخرى';
            }

            if (success === 'registered') {
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'تم التسجيل بنجاح! يرجى تسجيل الدخول';
            }
        })();
    </script>
<!-- زر تبديل الوضع الليلي -->
<button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="تبديل الوضع الليلي">
    🌙
</button>

<script src="script.js"></script>
<script>
    // التحقق من الوضع الليلي المحفوظ
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    });
</script>
</body>
</html>
