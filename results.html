<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة اختبار الذكاء - IQ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<!-- روابط ملفات CSS و JS -->
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
    <div class="results-container">
        <div class="results-card" id="resultsCard">
            <div class="result-icon" id="resultIcon">🧠</div>
            <h1>📊 نتيجة اختبار الذكاء</h1>
            
            <div class="iq-score-container">
                <div class="iq-score-number" id="iqScore">0</div>
                <div class="iq-score-label">نسبة الذكاء (IQ)</div>
            </div>

            <div class="iq-level-badge" id="iqLevel">متفوق ⭐</div>
            <p class="iq-description" id="iqDescription">نتيجة رائعة!</p>

            <div class="iq-bar-container">
                <div class="iq-bar-labels">
                    <span>ضعيف</span>
                    <span>متوسط</span>
                    <span>جيد</span>
                    <span>متفوق</span>
                    <span>عبقري</span>
                </div>
                <div class="iq-bar">
                    <div class="iq-bar-fill" id="iqBarFill" style="width: 0%;"></div>
                    <div class="iq-bar-marker" id="iqBarMarker" style="left: 0%;">▼</div>
                </div>
            </div>

            <div class="results-stats">
                <div class="stat-item">
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-label">✅ إجابات صحيحة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wrongCount">0</div>
                    <div class="stat-label">❌ إجابات خاطئة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="percentageDisplay">0%</div>
                    <div class="stat-label">📈 نسبة النجاح</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalQuestions">0</div>
                    <div class="stat-label">📝 إجمالي الأسئلة</div>
                </div>
            </div>

            <div class="results-actions">
                <button class="btn-retry" onclick="retryTest()">🔄 إعادة الاختبار</button>
                <button class="btn-dashboard" onclick="goToDashboard()">🏠 الرئيسية</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
