<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الذكاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="test-container">
        <!-- رأس الصفحة -->
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">م</div>
                <span class="username" id="userName">مستخدم</span>
            </div>
            <div class="progress-info">
                <span class="score-badge" id="scoreDisplay">0 نقطة</span>
                <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar-wrapper">
            <div class="progress-text">
                <span id="progressLabel">السؤال 1 من 12</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- بطاقة السؤال -->
        <div class="question-card" id="questionCard">
            <div class="question-number" id="questionNumber">السؤال 1</div>
            <div class="question-text" id="questionText">جارٍ تحميل الأسئلة...</div>
            <div class="options" id="optionsContainer">
                <!-- سيتم توليد الخيارات بواسطة JavaScript -->
            </div>
            <div class="controls">
                <button class="btn-prev" id="prevBtn" disabled>السابق</button>
                <button class="btn-next" id="nextBtn">التالي</button>
                <button class="btn-submit hidden" id="submitBtn">إنهاء الاختبار</button>
            </div>
            <div class="question-counter" id="questionCounter">1 / 12</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // جلب اسم المستخدم من الجلسة
        fetch('test.php?action=get_user')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('userName').textContent = data.username;
                    document.getElementById('userAvatar').textContent = data.username.charAt(0);
                }
            })
            .catch(() => {
                // إذا لم يتم تسجيل الدخول، التوجيه لتسجيل الدخول
                window.location.href = 'login.html';
            });
    </script>
<!-- زر تبديل الوضع الليلي -->
<button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="تبديل الوضع الليلي">
    🌙
</button>

<script src="script.js"></script>
<script>
    // التحقق من الوضع الليلي المحفوظ
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    });
</script>
</body>
</html>
